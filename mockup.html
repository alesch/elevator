<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elevator GUI - Refined Technical Mockup</title>
    <style>
        :root {
            --bg-color: #e5dccb; /* Textured paper/beige */
            --border-color: #333;
            --panel-bg: #fff;
            --accent-color: #5d6d7e; /* Industrial grey-blue */
            --text-color: #1a1a1a;
            --toon-border: 2px solid #333;
            --panel-border: 3px solid #333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #c9c0b1;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--text-color);
            overflow: hidden;
        }

        /* 16:9 Aspect Ratio Container */
        .dashboard-container {
            width: 95vw;
            height: calc(95vw * 9 / 16);
            max-height: 95vh;
            max-width: 168vh;
            background-color: var(--bg-color);
            border: 4px solid var(--border-color);
            display: flex;
            flex-direction: column;
            box-shadow: 10px 10px 20px rgba(0,0,0,0.1);
            overflow: hidden;
            position: relative;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: row;
            overflow: hidden;
        }

        .left-panel {
            flex: 1;
            display: flex;
            flex-direction: row;
            border-right: 2px solid var(--border-color);
        }

        .right-panel {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            background: rgba(255,255,255,0.4);
        }

        .shaft-container {
            flex: 1.2;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding: 20px;
            border-right: 1px solid #ccc;
        }

        .floor-labels {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 300px;
            font-weight: bold;
            font-size: 1.2rem;
            color: #555;
            padding: 10px 0;
        }

        .shaft-visualization {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .elevator-indicator {
            background: #1a1a1a;
            color: #0f0; 
            padding: 2px 8px;
            font-family: monospace;
            font-size: 1.1rem;
            border: 2px solid #555;
            border-radius: 3px;
            margin-bottom: 10px;
            min-width: 40px;
            text-align: center;
        }

        .shaft-diagram {
            width: 100px;
            height: 300px;
            border: var(--panel-border);
            position: relative;
            background: #d5dbdb;
            display: flex;
            flex-direction: column;
        }

        .floor-slot {
            flex: 1;
            border-bottom: 1px solid #999;
            width: 100%;
            position: relative;
        }
        .floor-slot:last-child { border-bottom: none; }

        .car-placeholder {
            width: 90px;
            height: 48px;
            background-color: var(--accent-color); 
            border: 2px solid #333;
            position: absolute;
            left: 3px;
            bottom: 0px; 
            display: flex;
            overflow: hidden;
            transition: bottom 1.5s ease-in-out;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            z-index: 5;
        }

        .door {
            flex: 1;
            height: 100%;
            background: linear-gradient(to right, #7f8c8d, #bdc3c7, #7f8c8d);
            border: 1px solid #333;
            transition: transform 0.8s ease-in-out;
            z-index: 10;
        }

        .door-left { border-right: 1px solid #333; }
        .door-right { border-left: 1px solid #333; }

        .doors-open .door-left { transform: translateX(-92%); }
        .doors-open .door-right { transform: translateX(92%); }

        .button-console {
            flex: 0.8;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .console-button {
            width: 46px;
            height: 46px;
            border: 2px solid #333;
            background: #fdfefe;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            box-shadow: 3px 3px 0px #333;
            transition: all 0.1s;
            user-select: none;
        }

        .console-button:active {
            box-shadow: 0px 0px 0px #333;
            transform: translate(3px, 3px);
        }

        .special-buttons {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        .log-header {
            font-size: 1.4rem;
            margin-bottom: 20px;
            border-bottom: 2px solid #333;
            padding-bottom: 5px;
            letter-spacing: 1px;
            color: #2c3e50;
            font-weight: bold;
        }

        .activity-log {
            flex: 1;
            background-color: #fff;
            border: 1px solid #333;
            padding: 15px;
            font-size: 0.9rem;
            overflow-y: auto;
            border-radius: 4px;
        }

        .log-entry {
            margin-bottom: 8px;
            border-bottom: 1px solid #eee;
            padding-bottom: 4px;
            font-family: 'Consolas', 'Monaco', monospace;
        }

        .log-entry span { margin-right: 8px; font-size: 1.1rem; }

        .status-footer {
            height: 90px;
            background: #2c3e50;
            border-top: 4px solid #1a1a1a;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 10px;
            color: #ecf0f1;
        }

        .actor-status {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .actor-icon { font-size: 1.8rem; }

        .actor-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
            color: #bdc3c7;
        }

        .actor-state {
            font-size: 0.9rem;
            font-weight: bold;
            color: #0f0;
        }

    </style>
</head>
<body>

    <div class="dashboard-container">
        <div class="main-content">
            <div class="left-panel">
                <div class="shaft-container">
                    <div class="floor-labels">
                        <div>5</div>
                        <div>4</div>
                        <div>3</div>
                        <div>2</div>
                        <div>1</div>
                        <div>0</div>
                    </div>
                    
                    <div class="shaft-visualization">
                        <div id="indicator" class="elevator-indicator">0</div>
                        <div class="shaft-diagram">
                            <div class="floor-slot"></div>
                            <div class="floor-slot"></div>
                            <div class="floor-slot"></div>
                            <div class="floor-slot"></div>
                            <div class="floor-slot"></div>
                            <div class="floor-slot"></div>
                            <div id="elevator-car" class="car-placeholder">
                                <div class="door door-left"></div>
                                <div class="door door-right"></div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="button-console">
                    <div class="console-button" onclick="goToFloor(5)">5</div>
                    <div class="console-button" onclick="goToFloor(4)">4</div>
                    <div class="console-button" onclick="goToFloor(3)">3</div>
                    <div class="console-button" onclick="goToFloor(2)">2</div>
                    <div class="console-button" onclick="goToFloor(1)">1</div>
                    <div class="console-button" onclick="goToFloor(0)">0</div>
                    <div class="special-buttons">
                        <div class="console-button" style="width:40px; height:40px; font-size: 0.8rem;" onclick="openDoors()">&lt;|&gt;</div>
                        <div class="console-button" style="width:40px; height:40px; font-size: 0.8rem;" onclick="closeDoors()">&gt;|&lt;</div>
                    </div>
                </div>
            </div>

            <div class="right-panel">
                <h3 class="log-header">ACTIVITY LOG</h3>
                <div id="log" class="activity-log">
                    <div class="log-entry">🧠 [14:45:01] CONTROLLER: Ready.</div>
                </div>
            </div>
        </div>

        <div class="status-footer">
            <div class="actor-status">
                <div class="actor-icon">🧠</div>
                <div class="actor-label">Controller</div>
                <div id="st-controller" class="actor-state">IDLE</div>
            </div>
            <div class="actor-status">
                <div class="actor-icon">⚙️</div>
                <div class="actor-label">Motor</div>
                <div id="st-motor" class="actor-state">STOPPED</div>
            </div>
            <div class="actor-status">
                <div class="actor-icon">🚪</div>
                <div class="actor-label">Door</div>
                <div id="st-door" class="actor-state">OPEN</div>
            </div>
            <div class="actor-status">
                <div class="actor-icon">👁️</div>
                <div class="actor-label">Sensor</div>
                <div id="st-sensor" class="actor-state">CLEAR</div>
            </div>
        </div>
    </div>

    <script>
        const car = document.getElementById('elevator-car');
        const log = document.getElementById('log');
        const indicator = document.getElementById('indicator');
        const stCtrl = document.getElementById('st-controller');
        const stMotor = document.getElementById('st-motor');
        const stDoor = document.getElementById('st-door');
        const stSensor = document.getElementById('st-sensor');

        let isMoving = false;

        function addLog(actor, msg) {
            const time = new Date().toLocaleTimeString('en-GB', { hour12: false });
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<span>${actor}</span> [${time}] ${msg}`;
            log.prepend(entry);
        }

        function updateStatus(actor, state, color = "#0f0") {
            actor.innerText = state.toUpperCase();
            actor.style.color = color;
        }

        function goToFloor(f) {
            if (isMoving) return;
            closeDoors();
            setTimeout(() => {
                isMoving = true;
                const bottomValue = f * 50; 
                car.style.bottom = `${bottomValue}px`;
                addLog('🧠', `Heading to Floor ${f}`);
                updateStatus(stCtrl, `MOVING TO ${f}`, "#3498db");
                updateStatus(stMotor, "RUNNING", "#f39c12");
                updateStatus(stSensor, "TRACKING");

                setTimeout(() => {
                    isMoving = false;
                    indicator.innerText = f;
                    addLog('👁️', `Arrived Floor ${f}.`);
                    updateStatus(stCtrl, "ARRIVED", "#2ecc71");
                    updateStatus(stMotor, "STOPPED", "#2ecc71");
                    setTimeout(() => {
                        updateStatus(stCtrl, "IDLE", "#2ecc71");
                        openDoors();
                    }, 500);
                }, 1500);
            }, 800);
        }

        function openDoors() {
            car.classList.add('doors-open');
            addLog('🚪', 'Doors Opening.');
            updateStatus(stDoor, "OPEN", "#2ecc71");
        }

        function closeDoors() {
            car.classList.remove('doors-open');
            addLog('🚪', 'Doors Closing.');
            updateStatus(stDoor, "CLOSED", "#e67e22");
        }
    </script>
</body>
</html>
